name: ml-service CI/CD

on:
  push:
    branches: [main]
    paths:
      - "ml-service/**"
      - ".github/workflows/ml-service-ci.yml"
  pull_request:
    paths:
      - "ml-service/**"

defaults:
  run:
    working-directory: ml-service

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ml-service/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Lint
        run: ruff check src tests

      - name: Test
        run: pytest tests/ -v

  build-and-push-image:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ml-service
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/face-verification-api:latest

  deploy-to-hf-spaces:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }} # format: username/space-name
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_SPACE" ]; then
            echo "HF_TOKEN or HF_SPACE secret not set -- skipping deploy. See README for setup."
            exit 0
          fi
          git config user.email "ci@example.com"
          git config user.name "CI"
          git subtree split --prefix ml-service -b hf-deploy
          git push "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}" hf-deploy:main --force
